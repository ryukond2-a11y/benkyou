<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>中学数学マスター</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>中学数学診断</h1>
            <div id="user-info"></div>
        </header>

        <section id="test-section" class="card">
            <div class="progress-bar"><div id="progress"></div></div>
            <div id="question-container">
                <h2 id="q-title">問題</h2>
                <p id="q-text">読み込み中...</p>
                <input type="text" id="answer-input" placeholder="答えを入力">
                <button onclick="submitAnswer()">回答する</button>
            </div>
        </section>

        <section id="practice-section" class="card hidden">
            <div id="recommendation-banner"></div>
            <h3>単元別演習</h3>
            <ul id="unit-list">
                <li data-level="1">Lv.1 正負の数</li>
                <li data-level="2">Lv.2 文字の式</li>
                <li data-level="3">Lv.3 一次方程式</li>
                <li data-level="4">Lv.4 連立方程式(基本)</li>
                <li data-level="5">Lv.5 連立方程式(応用)</li>
            </ul>
        </section>

        <div id="feedback-panel" class="panel hidden">
            <div id="feedback-result"></div>
            <div id="ai-comment"></div>
            <button onclick="nextQuestion()">次へ</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
