<section id="settings-section" class="card hidden">
    <h2>学習設定</h2>
    <p>診断または演習の問題数を選択してください</p>
    <div class="select-group">
        <button class="btn-outline" onclick="setCount(5)">5問</button>
        <button class="btn-outline" onclick="setCount(10)">10問</button>
        <button class="btn-outline" onclick="setCount(20)">20問</button>
    </div>
</section>

<section id="menu-section" class="card hidden">
    <h2 class="title">学習ロードマップ</h2>
    <div id="recommendation-banner" class="status-badge"></div>
    <div class="unit-grid">
        <div class="unit-card" onclick="startUnit('正負の数')">正負の数</div>
        <div class="unit-card" onclick="startUnit('文字の式')">文字の式</div>
        <div class="unit-card" onclick="startUnit('一次方程式')">一次方程式</div>
        <div class="unit-card highlight" onclick="startUnit('連立方程式')">連立方程式</div>
    </div>
</section>

<div id="feedback-panel" class="panel">
    <h3 id="feedback-result"></h3>
    <div class="ai-box">
        <p id="ai-comment"></p>
        <div id="ai-generated-area" class="hidden">
            <hr>
            <p><strong>AIからの挑戦状（類題）：</strong></p>
            <p id="ai-new-question"></p>
            <input type="text" id="ai-answer-input" placeholder="類題の答え">
            <button class="btn-small" onclick="checkAIAnswer()">類題を判定</button>
        </div>
    </div>
    <button class="btn-next" onclick="nextQuestion()">次の本番問題へ</button>
</div>
