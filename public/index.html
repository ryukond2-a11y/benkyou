<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI数学マスター | 根田理化学研究所</title>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>window.MathJax = { tex: { inlineMath: [['$', '$']] } };</script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .hidden { display: none; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0061da; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#0061da; text-align:center;">AI数学マスター</h2>
        <div id="auth-area">
            <input id="uname" placeholder="名前">
            <input id="pass" type="password" placeholder="パスワード">
            <button onclick="startApp()">スタート</button>
        </div>
        <div id="test-area" class="hidden">
            <div id="test-q-text"></div>
            <input id="test-ans" placeholder="答え">
            <button onclick="nextTestQ()">次へ</button>
        </div>
        <div id="study-area" class="hidden">
            <div id="q-text"></div>
            <input id="user-ans" placeholder="答え">
            <button onclick="checkAnswer()">回答</button>
            <div id="explanation" class="hidden" style="background:#eee; padding:10px; margin-top:10px;"></div>
            <button id="next-btn" class="hidden" onclick="loadQuestion()">次へ</button>
        </div>
    </div>

    <script>
        let user = ""; let testQuestions = []; let currentIdx = 0; let score = 0;
        function renderMath() { if(window.MathJax) MathJax.typesetPromise(); }

        async function startApp() {
            user = document.getElementById("uname").value;
            const password = document.getElementById("pass").value;
            const res = await fetch("/api/auth", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({username: user, password}) });
            const result = await res.json();
            document.getElementById("auth-area").classList.add("hidden");
            if (result.data.hasTakenTest) {
                document.getElementById("study-area").classList.remove("hidden");
                loadQuestion();
            } else {
                testQuestions = [ {q: "$3x-7=11$", a: 6}, {q: "$x+y=10, x-y=2$ の $x$", a: 6}, {q: "$2x=10$", a: 5}, {q: "$x+5=10$", a: 5}, {q: "$10-x=5$", a: 5} ];
                document.getElementById("test-area").classList.remove("hidden");
                showTest();
            }
        }

        function showTest() {
            document.getElementById("test-q-text").innerHTML = testQuestions[currentIdx].q;
            renderMath();
        }

        async function nextTestQ() {
            if(document.getElementById("test-ans").value == testQuestions[currentIdx].a) score++;
            currentIdx++;
            if(currentIdx < 5) { document.getElementById("test-ans").value = ""; showTest(); }
            else {
                await fetch("/api/finish-test", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({username: user, score}) });
                document.getElementById("test-area").classList.add("hidden");
                document.getElementById("study-area").classList.remove("hidden");
                loadQuestion();
            }
        }

        async function loadQuestion() {
            document.getElementById("q-text").innerText = "AI生成中...";
            const res = await fetch("/api/question", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({username: user}) });
            window.currentQ = await res.json();
            document.getElementById("q-text").innerHTML = window.currentQ.question;
            document.getElementById("explanation").classList.add("hidden");
            document.getElementById("next-btn").classList.add("hidden");
            renderMath();
        }

        function checkAnswer() {
            const isCorrect = (document.getElementById("user-ans").value == window.currentQ.answer);
            document.getElementById("explanation").innerHTML = (isCorrect ? "✅正解！" : "❌残念") + "<br>" + window.currentQ.explanation;
            document.getElementById("explanation").classList.remove("hidden");
            document.getElementById("next-btn").classList.remove("hidden");
            renderMath();
        }
    </script>
</body>
</html>
